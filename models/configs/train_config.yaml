# YOLOv8 Training Configuration
# NOTE: device setting here is overridden by config.py DEVICE when using train.py

model: yolov8n.pt
data: data/processed/dataset.yaml
epochs: 20
imgsz: 640
batch: 4
device: auto
optimizer: AdamW
lr0: 0.001
lrf: 0.01
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
flipud: 0.0
fliplr: 0.5
mosaic: 0.5
mixup: 0.0
project: models/checkpoints
name: sku110k_run
save: true
save_period: 5
